# LiteLLM Proxy Configuration — Local Development
# ================================================
# This config routes all LLM calls through the LiteLLM proxy on port 4000.
# Langfuse tracing is enabled via success_callback / failure_callback.
# Flash Agent sends extra_body.metadata on each call for rich trace context
# (scan_id, step, namespace, experiment IDs).
#
# Required env vars at proxy startup:
#   AZURE_API_BASE, AZURE_API_KEY, LITELLM_MASTER_KEY
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST

model_list:
  # model_name = AZURE_OPENAI_DEPLOYMENT from .env (e.g. gpt-4, claude-3-5-sonnet, etc.)
  # build-litellm.sh substitutes LITELLM_MODEL_NAME at apply time.
  # Agents send model=<deployment-name>; no alias layer — traces show the real model.
  - model_name: LITELLM_MODEL_NAME
    litellm_params:
      model: os.environ/AZURE_MODEL
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION
    model_info:
      base_model: os.environ/AZURE_MODEL

litellm_settings:
  # Keep custom metadata fields (trace_id, generation_name, etc.) so
  # Langfuse callback can group all calls under one canonical trace.
  drop_params: false
  set_verbose: false
  # Langfuse callback — all LLM calls are traced automatically.
  # Flash Agent sends extra_body.metadata on each call for rich trace context.
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # Retry settings — automatic retry on transient failures
  num_retries: 3
  retry_after: 30

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  allow_requests_on_health: true
