apiVersion: v1
kind: Pod
metadata:
  name: helm-debug
  namespace: litmus
spec:
  serviceAccountName: argo-chaos
  restartPolicy: Never
  containers:
  - name: debug
    image: agentcert/agentcert-install-app:latest
    imagePullPolicy: IfNotPresent
    command: ["sh", "-c", "helm version; echo '---'; helm upgrade --help 2>&1 | grep -i burst; echo '---'; helm upgrade --help 2>&1 | grep -i qps; echo '---'; helm env; echo '---SLEEP---'; sleep 3600"]
