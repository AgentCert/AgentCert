apiVersion: v1
kind: ServiceAccount
metadata:
  name: limitrange-enforcer
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: limitrange-enforcer
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["limitranges"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: limitrange-enforcer
subjects:
  - kind: ServiceAccount
    name: limitrange-enforcer
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: limitrange-enforcer
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: global-limits-enforcer
  namespace: kube-system
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: limitrange-enforcer
          restartPolicy: OnFailure
          containers:
            - name: enforcer
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -lc
                - |
                  set -e
                  for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'); do
                    if [ "$ns" = "kube-system" ] || [ "$ns" = "kube-public" ] || [ "$ns" = "kube-node-lease" ]; then
                      continue
                    fi

                    kubectl -n "$ns" create limitrange global-container-limits \
                      --limits=memory=1Gi \
                      --requests=memory=512Mi \
                      --dry-run=client -o yaml | kubectl -n "$ns" apply -f -
                  done
