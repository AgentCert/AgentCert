# --- ServiceAccount for MCP Server ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
  namespace: litmus

---
# --- ClusterRole with access to Litmus CRDs + standard K8s resources ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-server-role
rules:
  # Standard Kubernetes resources (read-only)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "events", "namespaces", "nodes", "replicationcontrollers", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]

  # Litmus Chaos CRDs
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Litmus EventTracker CRDs
  - apiGroups: ["eventtracker.litmuschaos.io"]
    resources: ["eventtrackerpolicies"]
    verbs: ["get", "list", "watch"]

  # Argo Workflow CRDs (used by Litmus)
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "cronworkflows", "workflowtemplates", "clusterworkflowtemplates", "workflowtasksets", "workflowtaskresults"]
    verbs: ["get", "list", "watch"]

  # CRD discovery (needed for MCP server to list available resource types)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]

  # OpenShift (if applicable)
  - apiGroups: ["apps.openshift.io"]
    resources: ["deploymentconfigs"]
    verbs: ["get", "list"]

---
# --- Bind the ClusterRole to the MCP ServiceAccount ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-server-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-server-role
subjects:
  - kind: ServiceAccount
    name: mcp-server
    namespace: litmus

---
# --- MCP Server Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: litmus
  labels:
    app: kubernetes-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: mcp-server
          image: quay.io/containers/kubernetes_mcp_server:latest
          args:
            - "--port"
            - "8081"
            - "--stateless"
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "200Mi"
            limits:
              memory: "256Mi"
              cpu: "500m"
              ephemeral-storage: "500Mi"
          securityContext:
            runAsUser: 65532
            allowPrivilegeEscalation: false

---
# --- Service to expose MCP Server within the cluster ---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  namespace: litmus
  labels:
    app: kubernetes-mcp-server
spec:
  type: ClusterIP
  selector:
    app: kubernetes-mcp-server
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http