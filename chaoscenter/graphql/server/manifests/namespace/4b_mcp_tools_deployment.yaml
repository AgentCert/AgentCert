---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-mcp-config
  namespace: #{INFRA_NAMESPACE}
data:
  PROMETHEUS_URL: "#{PROMETHEUS_MCP_URL}"
  PROMETHEUS_MCP_SERVER_TRANSPORT: "http"
  PROMETHEUS_MCP_BIND_HOST: "0.0.0.0"
  PROMETHEUS_MCP_BIND_PORT: "9090"
  PROMETHEUS_REQUEST_TIMEOUT: "30"
  PROMETHEUS_URL_SSL_VERIFY: "true"
  PROMETHEUS_DISABLE_LINKS: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-mcp-secret
  namespace: #{INFRA_NAMESPACE}
type: Opaque
stringData:
  PLACEHOLDER: "unused"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: #{INFRA_NAMESPACE}
  labels:
    app: kubernetes-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
    spec:
      serviceAccountName: mcp-server
      #{TOLERATIONS}
      #{NODE_SELECTOR}
      containers:
        - name: mcp-server
          image: #{KUBERNETES_MCP_SERVER_IMAGE}
          args:
            - "--port"
            - "8081"
            - "--stateless"
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "200Mi"
            limits:
              memory: "256Mi"
              cpu: "500m"
              ephemeral-storage: "500Mi"
          securityContext:
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  namespace: #{INFRA_NAMESPACE}
  labels:
    app: kubernetes-mcp-server
spec:
  type: ClusterIP
  selector:
    app: kubernetes-mcp-server
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-mcp-server
  namespace: #{INFRA_NAMESPACE}
  labels:
    app: prometheus-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-mcp-server
  template:
    metadata:
      labels:
        app: prometheus-mcp-server
    spec:
      serviceAccountName: prometheus-mcp-server
      #{TOLERATIONS}
      #{NODE_SELECTOR}
      containers:
        - name: prometheus-mcp-server
          image: #{PROMETHEUS_MCP_SERVER_IMAGE}
          envFrom:
            - configMapRef:
                name: prometheus-mcp-config
            - secretRef:
                name: prometheus-mcp-secret
          ports:
            - containerPort: 9090
              name: http
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "200Mi"
            limits:
              memory: "256Mi"
              cpu: "500m"
              ephemeral-storage: "500Mi"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-mcp-server
  namespace: #{INFRA_NAMESPACE}
  labels:
    app: prometheus-mcp-server
spec:
  type: ClusterIP
  selector:
    app: prometheus-mcp-server
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
