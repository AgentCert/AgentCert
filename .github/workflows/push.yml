name: push-pipeline
on:
  push:
    branches:
      - test-push-workflow
      - ^v[0-9]*.[0-9]*.x$
    tags:
      - "*"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
      - name: Run backend checks
        working-directory: chaoscenter
        run: |
          make backend-services-checks

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run frontend checks
        working-directory: chaoscenter
        run: |
          make frontend-services-checks

  agentcert-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-pyaudio
      
      - name: Install dependencies
        run: |
          cd agentcert
          pip install -r requirements.txt
      
      - name: Run Python linting
        run: |
          cd agentcert
          pip install pylint black flake8
          echo "Running Black formatter check..."
          black --check src/ utils/ data_models/ || echo "⚠️ Black formatting needed"
          echo "Running Flake8 linter..."
          flake8 src/ utils/ data_models/ --max-line-length=120 --extend-ignore=E203,W503 || echo "⚠️ Flake8 issues found"

  build-and-deploy-to-minikube:
    runs-on: self-hosted
    needs:
      - backend-checks
      - frontend-checks
      - agentcert-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "IMG_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "IMG_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build ChaosCenter Docker images
        run: |
          echo "🔨 Building AgentCert ChaosCenter images..."
          
          cd chaoscenter
          
          # Build GraphQL Server
          echo "Building agentcert-server..."
          cd graphql/server
          docker build -t agentcert-server:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ../..
          
          # Build Authentication Server
          echo "Building agentcert-auth-server..."
          cd authentication
          docker build -t agentcert-auth-server:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ..
          
          # Build Subscriber
          echo "Building agentcert-subscriber..."
          cd subscriber
          docker build -t agentcert-subscriber:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ..
          
          # Build Event Tracker
          echo "Building agentcert-event-tracker..."
          cd event-tracker
          docker build -t agentcert-event-tracker:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ..
          
          # Build Dex Server
          echo "Building agentcert-dex-server..."
          cd dex-server
          docker build -t agentcert-dex-server:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ..
          
          # Build Frontend
          echo "Building agentcert-frontend..."
          cd web
          yarn install
          yarn build
          docker build -t agentcert-frontend:${{ steps.vars.outputs.IMG_TAG }} --build-arg TARGETARCH=amd64 .
          cd ..

      - name: Load images to Minikube
        run: |
          echo "📦 Loading images into Minikube..."
          
          minikube image load agentcert-server:${{ steps.vars.outputs.IMG_TAG }}
          minikube image load agentcert-auth-server:${{ steps.vars.outputs.IMG_TAG }}
          minikube image load agentcert-subscriber:${{ steps.vars.outputs.IMG_TAG }}
          minikube image load agentcert-event-tracker:${{ steps.vars.outputs.IMG_TAG }}
          minikube image load agentcert-dex-server:${{ steps.vars.outputs.IMG_TAG }}
          minikube image load agentcert-frontend:${{ steps.vars.outputs.IMG_TAG }}
          
          echo "✅ All images loaded to Minikube!"

      - name: Verify images in Minikube
        run: |
          echo "🔍 Verifying images in Minikube..."
          minikube image ls | grep agentcert || echo "Warning: No agentcert images found"
          
      - name: Tag as latest
        if: steps.vars.outputs.IMG_TAG != 'latest'
        run: |
          echo "🏷️ Tagging images as latest..."
          docker tag agentcert-server:${{ steps.vars.outputs.IMG_TAG }} agentcert-server:latest
          docker tag agentcert-auth-server:${{ steps.vars.outputs.IMG_TAG }} agentcert-auth-server:latest
          docker tag agentcert-subscriber:${{ steps.vars.outputs.IMG_TAG }} agentcert-subscriber:latest
          docker tag agentcert-event-tracker:${{ steps.vars.outputs.IMG_TAG }} agentcert-event-tracker:latest
          docker tag agentcert-dex-server:${{ steps.vars.outputs.IMG_TAG }} agentcert-dex-server:latest
          docker tag agentcert-frontend:${{ steps.vars.outputs.IMG_TAG }} agentcert-frontend:latest
          
          minikube image load agentcert-server:latest
          minikube image load agentcert-auth-server:latest
          minikube image load agentcert-subscriber:latest
          minikube image load agentcert-event-tracker:latest
          minikube image load agentcert-dex-server:latest
          minikube image load agentcert-frontend:latest

      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Deploying AgentCert services to Kubernetes..."
          
          # Update deployments with new images (using :latest tag for Minikube compatibility)
          kubectl set image deployment/litmusportal-server graphql-server=agentcert-server:latest -n litmus
          kubectl set image deployment/litmusportal-auth-server auth-server=agentcert-auth-server:latest -n litmus
          kubectl set image deployment/subscriber subscriber=agentcert-subscriber:latest -n litmus
          kubectl set image deployment/event-tracker event-tracker=agentcert-event-tracker:latest -n litmus
          kubectl set image deployment/litmusportal-frontend litmusportal-frontend=agentcert-frontend:latest -n litmus
          
          # Set ImagePullPolicy to Never for Minikube (uses local images)
          kubectl patch deployment litmusportal-server -n litmus -p '{"spec":{"template":{"spec":{"containers":[{"name":"graphql-server","imagePullPolicy":"Never"}]}}}}'
          kubectl patch deployment litmusportal-auth-server -n litmus -p '{"spec":{"template":{"spec":{"containers":[{"name":"auth-server","imagePullPolicy":"Never"}]}}}}'
          kubectl patch deployment subscriber -n litmus -p '{"spec":{"template":{"spec":{"containers":[{"name":"subscriber","imagePullPolicy":"Never"}]}}}}'
          kubectl patch deployment event-tracker -n litmus -p '{"spec":{"template":{"spec":{"containers":[{"name":"event-tracker","imagePullPolicy":"Never"}]}}}}'
          kubectl patch deployment litmusportal-frontend -n litmus -p '{"spec":{"template":{"spec":{"containers":[{"name":"litmusportal-frontend","imagePullPolicy":"Never"}]}}}}'
          
          echo "⏳ Waiting for deployments to roll out..."
          
      - name: Wait for deployment rollout
        run: |
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/litmusportal-server -n litmus --timeout=300s
          kubectl rollout status deployment/litmusportal-auth-server -n litmus --timeout=300s
          kubectl rollout status deployment/subscriber -n litmus --timeout=300s
          kubectl rollout status deployment/event-tracker -n litmus --timeout=300s
          kubectl rollout status deployment/litmusportal-frontend -n litmus --timeout=300s
          
      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployments..."
          kubectl get pods -n litmus -o wide
          
          echo ""
          echo "📊 Deployment Images:"
          kubectl get deployments -n litmus -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.template.spec.containers[0].image}{"\n"}{end}' | grep -E "(litmusportal|subscriber|event-tracker)"
          
      - name: Deployment summary
        run: |
          echo "=================================="
          echo "✅ AgentCert Deployment Complete!"
          echo "=================================="
          echo "Images built, loaded, and deployed:"
          echo "  • agentcert-server:${{ steps.vars.outputs.IMG_TAG }}"
          echo "  • agentcert-auth-server:${{ steps.vars.outputs.IMG_TAG }}"
          echo "  • agentcert-subscriber:${{ steps.vars.outputs.IMG_TAG }}"
          echo "  • agentcert-event-tracker:${{ steps.vars.outputs.IMG_TAG }}"
          echo "  • agentcert-frontend:${{ steps.vars.outputs.IMG_TAG }}"
          echo "=================================="
          echo "All pods are running with new images!"
          echo "=================================="
