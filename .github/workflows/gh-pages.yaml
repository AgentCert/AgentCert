name: Deploy Docs

# DISABLED: Documentation deployment not needed yet
# To enable later: 
#   1. Set up MkDocs in mkdocs/ folder
#   2. Add PERSONAL_TOKEN secret in GitHub settings
#   3. Enable GitHub Pages in repo settings
#   4. Uncomment the push trigger below
on:
  workflow_dispatch:  # Only runs manually from Actions tab
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: build docs
        run: |
          cd mkdocs
          pip install mkdocs mkdocs_material
          mkdocs build
      - name: deploy docs
        uses: peaceiris/actions-gh-pages@v2.5.0
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: ./mkdocs/site
