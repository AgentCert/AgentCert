---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: network
  version: 0.1.0
  annotations:
    categories: Network
    vendor: LitmusChaos
spec:
  displayName: Network Faults
  categoryDescription: |
    Network faults disrupt network connectivity and performance in Kubernetes clusters.
    - Injects various network failures like latency, packet loss, and duplication
    - Simulates real-world network conditions and degradation
    - Tests application resilience under adverse network scenarios
  keywords:
    - Kubernetes
    - Network
    - Chaos
    - Fault Injection
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  faults:
    - name: network-latency
      description: Injects network latency on target pods to simulate high-latency conditions.
      displayName: "Network Latency"
    - name: network-loss
      description: Injects network packet loss on target pods to simulate packet loss scenarios.
      displayName: "Packet Loss"
    - name: dns-blackhole
      description: Blocks DNS resolution for specific domains to simulate DNS failures.
      displayName: "DNS Blackhole"
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/network/icons/network.svg
      mediatype: "image/svg+xml"

