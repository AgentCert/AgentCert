---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: dns-blackhole
  version: 0.1.0
  annotations:
    categories: Network
    vendor: LitmusChaos
spec:
  displayName: DNS Blackhole
  categoryDescription: |
    DNS blackhole fault injects DNS resolution failures on the target pods in a Kubernetes cluster.
    - Blocks DNS resolution for specific domains or all DNS traffic by dropping or rejecting DNS requests.
    - The applications deployed on the pods may experience DNS resolution failures and timeouts.
    - Tests application resiliency and recovery workflows under DNS failure scenarios.
  keywords:
    - Kubernetes
    - Network
    - DNS
    - Chaos
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  experiments:
    - dns-blackhole
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/network/icons/dns-blackhole.svg
      mediatype: "image/svg+xml"

