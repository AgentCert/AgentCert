---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: dns-blackhole-chaos
  namespace: default
spec:
  appinfo:
    appns: ''
    applabel: ''
    appkind: ''
  # It can be active/stop
  engineState: 'active'
  chaosServiceAccount: dns-blackhole-sa
  experiments:
    - name: dns-blackhole
      spec:
        components:
          env:
            # set chaos duration (in sec) as desired
            - name: TOTAL_CHAOS_DURATION
              value: '60'

            # DNS server IP to block
            - name: DNS_SERVER_IP
              value: ''

            # Domain names to block (comma-separated)
            - name: DOMAIN_NAMES
              value: ''

            # Network interface to use
            - name: NETWORK_INTERFACE
              value: 'eth0'

            # DNS port
            - name: DNS_PORT
              value: '53'

            ## percentage of total pods to target
            - name: PODS_AFFECTED_PERC
              value: ''

