---
apiVersion: litmuschaos.io/v1alpha1
description:
  message: |
    Injects resource consumption on nodes belonging to a Kubernetes cluster
kind: ChaosExperiment
metadata:
  name: node-resource-hog
  labels:
    name: node-resource-hog
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/component: chaosexperiment
    app.kubernetes.io/version: ci
spec:
  definition:
    scope: Cluster
    permissions:
      # Create and monitor the experiment & helper pods
      - apiGroups: [""]
        resources: ["pods"]
        verbs:
          [
            "create",
            "delete",
            "get",
            "list",
            "patch",
            "update",
            "deletecollection",
          ]
      # Performs CRUD operations on the events inside chaosengine and chaosresult
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["create", "get", "list", "patch", "update"]
      # Fetch configmaps details and mount it to the experiment pod (if specified)
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list"]
      # Track and get the runner, experiment, and helper pods log
      - apiGroups: [""]
        resources: ["pods/log"]
        verbs: ["get", "list", "watch"]
      # for creating and managing to execute commands inside target container
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["get", "list", "create"]
      # Get node information
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["list", "get"]
      # for configuring and monitor the experiment job by the chaos-runner pod
      - apiGroups: ["batch"]
        resources: ["jobs"]
        verbs: ["create", "list", "get", "delete", "deletecollection"]
      # for creation, status polling and deletion of litmus chaos resources used within a chaos workflow
      - apiGroups: ["litmuschaos.io"]
        resources: ["chaosengines", "chaosexperiments", "chaosresults"]
        verbs: ["create", "list", "get", "patch", "update", "delete"]
    image: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
    imagePullPolicy: Always
    args:
      - -c
      - ./experiments -name node-resource-hog
    command:
      - /bin/bash
    env:
      - name: TOTAL_CHAOS_DURATION
        value: "60"

      ## Number of CPU cores to stress on the node
      - name: CPU_CORES
        value: "1"

      ## LOAD CPU WITH GIVEN PERCENT LOADING FOR THE CPU STRESS WORKERS.
      ## 0 IS EFFECTIVELY A SLEEP (NO LOAD) AND 100 IS FULL LOADING
      - name: CPU_LOAD
        value: "100"

      ## Memory consumption in percentage
      - name: MEMORY_PERCENTAGE
        value: "30"

      ## Period to wait before and after injection of chaos in sec
      - name: RAMP_TIME
        value: ""

      ## provide the cluster runtime
      - name: CONTAINER_RUNTIME
        value: "containerd"

      # provide the socket file path
      - name: SOCKET_PATH
        value: "/run/containerd/containerd.sock"

      - name: DEFAULT_HEALTH_CHECK
        value: "false"

      # Node label selector
      - name: NODE_LABEL
        value: ""

      ## it defines the sequence of chaos execution for multiple target nodes
      ## supported values: serial, parallel
      - name: SEQUENCE
        value: "parallel"

  labels:
    name: node-resource-hog
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/component: experiment-job
    app.kubernetes.io/runtime-api-usage: "true"
    app.kubernetes.io/version: ci
