---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: compute
  version: 0.1.0
  annotations:
    categories: Kubernetes
    chartDescription: Injects compute resource chaos experiments
    executionPlane: "kubernetes"
spec:
  displayName: Compute
  categoryDescription: >
    Compute resource chaos experiments stress CPU and memory resources on Kubernetes nodes and pods.
    These experiments test application resilience to resource exhaustion and potential slowness.
    It will install all the compute-related experiments which can be used to inject chaos into containerized applications.
  faults:
    - name: pod-cpu-hog
      description: It injects pod-cpu-hog chaos by consuming CPU resources on targeted pods.
      displayName: "Pod CPU Hog"
    - name: pod-memory-hog
      description: It injects pod-memory-hog chaos by consuming memory resources on targeted pods.
      displayName: "Pod Memory Hog"
    - name: node-resource-hog
      description: It injects node-resource-hog chaos by exhausting CPU and memory resources on target nodes.
      displayName: "Node Resource Hog"
  keywords:
    - Kubernetes
    - Compute
    - CPU
    - Memory
    - Resource
  maintainers:
    - name: ksatchit
      email: karthik.s@harness.io
    - name: Udit Gaurav
      email: udit.gaurav@harness.io
  minKubeVersion: 1.12.0
  links:
    - name: Kubernetes Website
      url: https://kubernetes.io
    - name: LitmusChaos Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents/#compute
  icon:
    - url: https://github.com/litmuschaos/chaos-charts/blob/master/faults/compute/icons/compute.png
      mediatype: image/png
