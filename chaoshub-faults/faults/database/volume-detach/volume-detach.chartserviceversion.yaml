---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: volume-detach
  version: 0.1.0
  annotations:
    categories: Database
    vendor: LitmusChaos
spec:
  displayName: Volume Detach
  categoryDescription: |
    Volume detach fault injects storage failures by detaching persistent volumes from target pods in a Kubernetes cluster.
    - Simulates sudden volume unavailability on database pods
    - The applications deployed on the pods may experience data access failures and I/O errors
    - Tests application resiliency and recovery workflows under storage failure scenarios
  keywords:
    - Kubernetes
    - Database
    - Storage
    - Volume
    - Chaos
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  experiments:
    - volume-detach
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/database/icons/volume-detach.svg
      mediatype: "image/svg+xml"
