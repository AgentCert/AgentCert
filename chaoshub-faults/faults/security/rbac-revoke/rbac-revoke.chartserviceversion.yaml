---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: rbac-revoke
  version: 0.1.0
  annotations:
    categories: Security
    vendor: LitmusChaos
spec:
  displayName: RBAC Revoke
  categoryDescription: |
    RBAC revoke fault injects role-based access control violations on target resources in a Kubernetes cluster.
    - Simulates revoked RBAC permissions and access denials
    - Tests application resilience under authorization failures
    - Validates proper handling of permission-denied scenarios
  keywords:
    - Kubernetes
    - Security
    - RBAC
    - Authorization
    - Chaos
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  experiments:
    - rbac-revoke
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/security/icons/rbac-revoke.svg
      mediatype: image/svg+xml
