---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: config-misconfig
  version: 0.1.0
  annotations:
    categories: Application
    vendor: LitmusChaos
spec:
  displayName: Config Misconfig
  categoryDescription: |
    Config misconfig fault injects configuration errors and invalid settings on target applications in a Kubernetes cluster.
    - Simulates misconfigured application parameters and invalid settings
    - Tests application validation and error handling logic
    - Validates configuration management and recovery mechanisms
  keywords:
    - Kubernetes
    - Application
    - Configuration
    - Error Injection
    - Chaos
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  experiments:
    - config-misconfig
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/application/icons/config-misconfig.svg
      mediatype: image/svg+xml
