---
apiVersion: litmuschaos.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: pod-container-kill
  version: 0.1.0
  annotations:
    categories: Application
    vendor: LitmusChaos
spec:
  displayName: Pod/Container Kill
  categoryDescription: |
