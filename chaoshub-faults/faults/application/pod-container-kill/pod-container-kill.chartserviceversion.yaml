    - Tests application restart policies and recovery mechanisms
    - Validates replication controller and orchestration resilience
  keywords:
    - Kubernetes
    - Application
    - Container
    - Pod
    - Chaos
  platforms:
    - GKE
    - Konvoy
    - Packet(Kubeadm)
    - Minikube
    - EKS
    - AKS
    - Kind
    - Rancher
    - OpenShift(OKD)
  maintainers:
    - name: LitmusChaos
      email: support@litmuschaos.io
  experiments:
    - pod-container-kill
  minKubeVersion: 1.12.0
  labels:
    app.kubernetes.io/component: chartserviceversion
    app.kubernetes.io/version: ci
  links:
    - name: Documentation
      url: https://litmuschaos.github.io/litmus/experiments/categories/contents
  icon:
    - url: /faults/application/icons/pod-container-kill.svg
      mediatype: image/svg+xml
