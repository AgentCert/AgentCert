# Agent identity — set at deploy time via: helm install --set agentId=<uuid>
agentId: ""

app:
  chaosCenter:
    endpoint: http://chaoscenter.litmus.svc.cluster.local
    projectId: litmus-project-1
    clusterId: cluster-1

agent:
  name: my-ai-agent
  version: "1.0.0"
  vendor: "Litmus"

  mode: active          # Litmus agents are usually active
  scope: cluster        # cluster / namespace

  capabilities:
    - pod-delete
    - pod-cpu-hog

  supportedExperiments:
    - pod-delete
    - pod-cpu-hog

  containerImage:
    registry: docker.io
    repository: agentcert/flash-agent
    tag: latest
    pullPolicy: Always

  config:
    # --- LiteLLM Proxy ---
    LITELLM_URL: ""
    MODEL_ALIAS: ""
    OPENAI_BASE_URL: ""
    OPENAI_API_KEY: ""

    # --- Blind-observer mode ---
    # When "false", flash-agent excludes chaos tools (chaosengines,
    # chaosresults, argo_workflows) from MCP calls and strips chaos
    # sections from the LLM prompt.  Default "true" preserves full mode.
    MCP_INCLUDE_CHAOS_TOOLS: "false"

    # --- Experiment context (injected by install-agent via Argo template variables) ---
    # Empty defaults: agent works with or without experiment context.
    # When running inside an Argo Workflow, install-agent passes:
    #   --set agent.config.EXPERIMENT_ID={{workflow.labels.workflow_id}}
    #   --set agent.config.EXPERIMENT_RUN_ID={{workflow.uid}}
    #   --set agent.config.WORKFLOW_NAME={{workflow.labels.subject}}
    EXPERIMENT_ID: ""
    EXPERIMENT_RUN_ID: ""
    WORKFLOW_NAME: ""

  secret:
    LITELLM_MASTER_KEY: ""

  deploymentEnv:
    - name: OPENAI_BASE_URL
      key: OPENAI_BASE_URL
    - name: OPENAI_API_KEY
      key: OPENAI_API_KEY
    - name: EXPERIMENT_ID
      key: EXPERIMENT_ID
    - name: EXPERIMENT_RUN_ID
      key: EXPERIMENT_RUN_ID
    - name: WORKFLOW_NAME
      key: WORKFLOW_NAME

# ── agent-sidecar: transparent metadata-injection proxy ──────────────
# When enabled, a lightweight sidecar container intercepts agent→LiteLLM
# requests, injects agent identity into the metadata field, and forwards
# to upstream. The agent has ZERO awareness of experiment context.
#
# IMPORTANT: Experiment context (EXPERIMENT_ID, EXPERIMENT_RUN_ID,
# WORKFLOW_NAME) is intentionally NOT passed to the sidecar by default.
# This enforces the "blind observer" principle — the flash-agent must
# detect anomalies from system signals, not from prior knowledge of
# what faults are being injected.
# See: docs/Flash-agent-data-leakage-analysis.md
sidecar:
  enabled: true
  name: agent-sidecar
  image:
    registry: docker.io
    repository: agentcert/agent-sidecar
    tag: latest
    pullPolicy: Always
  port: 4001
  # The real LiteLLM proxy URL — sidecar forwards enriched requests here
  upstream: ""
  # Injection mode: "openai-metadata" | "http-header" | "none"
  injectionMode: "openai-metadata"
  # Comma-separated allowlist of metadata keys to inject.
  # Default: "AGENT_ID" (routing/billing only).
  # To restore legacy behaviour (NOT recommended):
  #   "AGENT_ID,EXPERIMENT_ID,EXPERIMENT_RUN_ID,WORKFLOW_NAME"
  allowedMetadataKeys: "AGENT_ID"
  resources:
    limits:
      cpu: "100m"
      memory: "64Mi"

env:
  mongoUri: mongodb://mongo-mongodb:27017

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch", "delete"]
